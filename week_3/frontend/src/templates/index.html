<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Resume Helper Chatbot</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
		<script>
			window.CONFIG = {
				BACKEND_URL: "{{ backend_url }}"
			};
		</script>
	</head>

	<body>
		<div class="container py-5">
			<!-- Chat History -->
			<div id="chatBody" class="rounded p-3 mb-3 d-flex flex-column gap-3">
				<div class="bg-white p-2 rounded shadow-sm align-self-start">
					Hello! How may I help you today?
				</div>
			</div>
			<!-- Input field -->
			<div class="d-flex align-items-center gap-2 border rounded px-2 py-2">
				<input
					id="msgInput"
					type="text"
					class="form-control border-0 shadow-none"
					placeholder="Type a message..."
				/>
				<button id="sendBtn" class="btn btn-sm px-3">Send</button>
			</div>
			<input type="file" id="fileInput" class="mt-2"/>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	
		<!-- Load PDF.js -->
		<script type="module" src="{{ url_for('static', path='/js/chat.js') }}"></script>
	</body>
</html>
